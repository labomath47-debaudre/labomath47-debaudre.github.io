<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/favicon.svg' | relative_url }}">
  <link rel="icon" type="image/png" href="{{ '/assets/favicon.png' | relative_url }}">
</head>
<body>

  <header class="site-header">
    <div class="container">
      <a href="{{ '/' | relative_url }}" class="site-logo">
      <img src="{{ '/assets/logo_labomath.png' | relative_url }}" alt="LaboMath — Lycée de Baudre, Agen">
    </a>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}">Accueil</a>
        <a href="{{ '/seconde/' | relative_url }}">Seconde</a>
        <a href="{{ '/premiere/' | relative_url }}">Première</a>
        <a href="{{ '/terminale/' | relative_url }}">Terminale</a>
        <a href="{{ '/passerelle/' | relative_url }}" class="nav-deux-lignes">
  <span>Passerelle</span>
  <span class="ligne-2">Bac → BTS</span>
</a>
        <a href="{{ '/bts/' | relative_url }}">BTS</a>
        <a href="{{ '/enseignants/' | relative_url }}">Enseignants</a>
      </nav>
    </div>
  </header>

  <main class="site-content">
    <div class="container">
      {{ content }}
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>LaboMath — Lycée de Baudre</p>
      <p><span class="symbole-pied">π</span>Mis à jour le {{ site.time | date: "%-d/%m/%Y" }}</p>
    </div>
  </footer>

</body>
</html>
